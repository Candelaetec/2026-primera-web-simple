<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Página Personal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="texto-movil">
      <p>★ Bienvenido a mi página personal ★</p>
    </div>
  </header>

  <div class="wrapper">
    <div class="full-width-box">
      <h1 class="siseven">Candela de la Cruz</h1>
      <p>★ Estudiante ★ Dibujante ★ Programadora (pseudo) ★ </p>
      
      <div class="glass-card">
        <div class="recorte">
          <img src="pfp.jpeg" alt="Foto de perfil">
        </div>
        
        <div class="social-buttons">
          <a href="https://quinnmera.neocities.org/" class="social-btn" title="Neocities"> 🐱 </a>
        </div>
      </div>
      <div class="rating-section">
        <h3>⭐ Valora esta página</h3>
        <div class="stars" id="stars">
          <span class="star" data-value="1">★</span>
          <span class="star" data-value="2">★</span>
          <span class="star" data-value="3">★</span>
          <span class="star" data-value="4">★</span>
          <span class="star" data-value="5">★</span>
        </div>
        <p class="rating-value" id="rating-value">Gracias por valorar!</p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
